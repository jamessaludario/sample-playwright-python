[pytest]
; This file configures pytest (our test runner).

; Where the runnable tests live: YOUR copy of the practice suite.
; Running "python tour.py" (or "python tour.py --create-tests") creates
; this folder from the sources in learn/. It is git-ignored, so you can
; edit and break the tests freely - that's what it is for.
testpaths = tour-tests

; Default command-line options applied every time you run "pytest":
;   --browser chromium        -> run tests in Chromium (Chrome's engine)
;   --html=...                -> write an HTML report you can open in a browser
;   --self-contained-html     -> put CSS/JS inside the one file, so you can
;                                share reports/report.html on its own
;   --alluredir=...           -> also record results for Allure, a fancier
;                                report with graphs and analytics. Turn the
;                                recorded results into a report with:
;                                  allure generate reports/allure-results -o reports/allure-report --clean
;                                  allure open reports/allure-report
;   --clean-alluredir         -> start each run with a fresh results folder,
;                                so old runs don't mix into the new report
;   --reruns 2                -> retry a failed test up to 2 more times before
;                                marking it failed for real. The practice site
;                                can be slow/flaky, so one bad moment shouldn't
;                                fail the whole run. Retried tests show up
;                                under "Reruns" in the HTML report and as
;                                "Retries" in Allure.
;   --reruns-delay 2          -> wait 2 seconds between retries, giving the
;                                site a moment to recover
addopts = --browser chromium --html=reports/report.html --self-contained-html --alluredir=reports/allure-results --clean-alluredir --reruns 2 --reruns-delay 2
